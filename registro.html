    <hr>

    <h2>Registro de usuario</h2>

    <form action="#" method="post">

        <h3>Datos personales</h3>

        <label for="nombres">Nombres:</label> <br>
        <input type="text" id="nombres" name="nombres" size="30"> <br><br>

        <label for="apellidos">Apellidos:</label> <br>
        <input type="text" id="apellidos" name="apellidos" size="30"> <br><br>

        <label for="dpi">DPI:</label> <br>
        <input type="text" id="dpi" name="dpi" size="20"> <br><br>

        <label for="nacimiento">Fecha de nacimiento:</label> <br>
        <input type="text" id="nacimiento" name="nacimiento" size="15"> <br><br>

        Genero: <br>
        <input type="radio" id="femenino" name="genero" value="f">
        <label for="femenino">Femenino</label> <br>
        <input type="radio" id="masculino" name="genero" value="m">
        <label for="masculino">Masculino</label> <br><br>

        <h3>Contacto</h3>

        <label for="correo">Correo:</label> <br>
        <input type="text" id="correo" name="correo" size="30"> <br><br>

        <label for="telefono">Telefono:</label> <br>
        <input type="text" id="telefono" name="telefono" size="20"> <br><br>

        <label for="direccion">Direccion:</label> <br>
        <textarea id="direccion" name="direccion" rows="3" cols="40"></textarea> <br><br>

        <h3>Cuenta</h3>

        <label for="usuario">Usuario:</label> <br>
        <input type="text" id="usuario" name="usuario" size="25"> <br><br>

        <label for="clave">Contrasena:</label> <br>
        <input type="password" id="clave" name="clave" size="25"> <br><br>

        <label for="confirma">Confirmar contrasena:</label> <br>
        <input type="password" id="confirma" name="confirma" size="25"> <br><br>

        <input type="checkbox" id="terminos" name="terminos" value="si">
        <label for="terminos">Acepto los terminos y condiciones</label> <br><br>

        <input type="submit" value="Crear cuenta">
        <input type="reset" value="Limpiar">

    </form>
