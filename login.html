    <h2>Iniciar sesion</h2>

    <form action="#" method="post">
        <label for="correo">Correo:</label> <br>
        <input type="text" id="correo" name="correo" size="30"> <br><br>

        <label for="clave">Contrasena:</label> <br>
        <input type="password" id="clave" name="clave" size="30"> <br><br>

        <input type="checkbox" id="recordar" name="recordar" value="si">
        <label for="recordar">Recordar sesion</label> <br><br>

        <input type="submit" value="Entrar">
        <input type="reset" value="Limpiar">
    </form>

    <hr>

    <h2>Recuperar contrasena</h2>

    <form action="#" method="post">
        <label for="recupera">Correo registrado:</label> <br>
        <input type="text" id="recupera" name="recupera" size="30"> <br><br>
        <input type="submit" value="Enviar">
    </form>
